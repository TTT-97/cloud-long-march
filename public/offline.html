<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云上长征 — 离线模式</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #F8F5F0;
      color: #2A2A2A;
    }
    h1 { font-size: 1.5rem; color: #8B1E24; margin-bottom: 0.5rem; }
    p { color: #6B7280; margin-bottom: 2rem; max-width: 300px; text-align: center; line-height: 1.6; }
    button {
      padding: 0.75rem 2rem;
      border: 1px solid #8B1E24;
      background: transparent;
      color: #8B1E24;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <h1>云上长征</h1>
  <p>您当前处于离线状态<br>You are currently offline</p>
  <button onclick="location.reload()">重新连接 Retry</button>
</body>
</html>
